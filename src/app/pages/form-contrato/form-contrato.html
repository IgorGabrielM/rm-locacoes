<div class="mb-5 bg-primary w-full flex items-center">
  <button pButton type="submit" icon="pi pi-arrow-left"
          class="p-button-primary" (click)="navigateBack()"></button>
  <span class="font-bold text-white text-lg w-10/12 text-center">Novo contrato</span>
</div>

<div class="min-h-screen w-full flex justify-center items-center">
  <form class="w-11/12" *ngIf="contratoForm" [formGroup]="contratoForm" (ngSubmit)="salvarContrato()">
    <div class="w-full flex flex-col gap-4">
      <div class="flex flex-col gap-1">
        <label for="nome" class="font-bold">Nome/Razão Social</label>
        <input pInputText id="nome" formControlName="nome" class="w-full"/>
      </div>

      <div class="flex flex-col gap-1">
        <label for="cpf" class="font-bold">CPF</label>
        <p-inputMask id="cpf" formControlName="cpf" mask="999.999.999-99" styleClass="w-full"></p-inputMask>
      </div>

      <div class="flex flex-col gap-1">
        <label for="rg" class="font-bold">RG</label>
        <p-inputMask id="rg" formControlName="rg" mask="99.999.999-*" styleClass="w-full"></p-inputMask>
      </div>

      <div class="flex flex-col gap-1">
        <label class="font-bold">Cidade</label>
        <p-autoComplete
          formControlName="cidade"
          [suggestions]="opcoesCidadesFiltered"
          (completeMethod)="filtrarCidades($event)"
          [dropdown]="true"
          styleClass="w-full">
        </p-autoComplete>
      </div>

      <div class="flex flex-col gap-1">
        <label for="endereco" class="font-bold">Endereço</label>
        <input pInputText id="endereco" formControlName="endereco"/>
      </div>

      <div class="flex flex-col gap-1">
        <label for="bairro" class="font-bold">Bairro</label>
        <input pInputText id="bairro" formControlName="bairro"/>
      </div>

      <div class="flex flex-col gap-1">
        <label for="telefone" class="font-bold">Telefone</label>
        <p-inputMask id="telefone" formControlName="telefone" mask="(99) 99999-9999" styleClass="w-full"></p-inputMask>
      </div>

      <div class="flex flex-col gap-1">
        <label for="email" class="font-bold">E-mail</label>
        <input pInputText type="email" id="email" formControlName="email"/>
      </div>

      <div class="flex flex-col gap-1">
        <label for="data-entrega" class="font-bold">Data da entrega</label>
        <input pInputText id="data-entrega" formControlName="dataEntrega" type="date">
      </div>

      <hr class="my-4 border-slate-200">

      <div formArrayName="equipamentos">
        <div *ngFor="let equip of equipamentos.controls; let i=index" [formGroupName]="i"
             class=" p-4 rounded-lg mb-4 relative border">
          <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
            <div class="flex flex-col gap-1">
              <label class="font-bold">Equipamento</label>
              <p-autoComplete
                formControlName="descricao"
                [suggestions]="opcoesEquipamentosFiltered"
                (completeMethod)="filtrarEquipamentos($event)"
                [dropdown]="true"
                styleClass="w-full">
              </p-autoComplete>
            </div>

            <div class="flex flex-col gap-1">
              <label class="font-bold">Quantidade</label>
              <input pInputText type="number" formControlName="quantidade"/>
            </div>
            <div class="flex flex-col gap-1">
              <label class="font-bold">Valor unitário (R$)</label>
              <input pInputText type="number" formControlName="valor"/>
            </div>
            <div class="flex justify-between gap-2">
              <button *ngIf="equipamentos.length > 1" pButton type="button" label="Excluir" icon="pi pi-trash"
                      class="p-button-outlined border-red-300 border p-button-danger w-full"
                      (click)="removerEquipamento(i)"></button>
            </div>
          </div>
        </div>
        <button pButton type="button" label="Adicionar equipamento" icon="pi pi-plus-circle"
                class="p-button-outlined w-full" (click)="addEquipamento()"></button>
      </div>


      <div class="mt-2 mb-5">
        <button pButton type="submit" label="Criar contrato" icon="pi pi-share-alt"
                class="p-button-primary w-full disabled:bg-gray-400 disabled:border-gray-400"
                [disabled]="contratoForm.invalid"></button>
      </div>
    </div>
  </form>
</div>

<div *ngIf="responseOfContrato$ | async as res"
     class="fixed inset-0 z-[9999] flex items-center justify-center w-full h-full p-4 bg-black/60 backdrop-blur-sm">

  <div class="relative w-full max-w-2xl">
    <div class="relative bg-white rounded-xl shadow-2xl border border-gray-200">

      <div class="flex items-center justify-between p-4 border-b border-gray-100">
        <h3 class="text-xl font-semibold text-gray-900">
          {{ res.status === '200' ? 'Sucesso' : 'Erro' }}
        </h3>
        <button type="button" (click)="fecharModal()" class="text-gray-400 hover:text-gray-900">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>

      <div class="p-6">
        <div *ngIf="res.status === '200'" class="flex items-center gap-3 p-4 text-green-800 bg-green-50 rounded-lg">
          <i class="pi pi-check-circle text-xl"></i>
          <span>{{ res.message }}</span>
        </div>

        <div *ngIf="res.status !== '200'" class="flex items-center gap-3 p-4 text-red-800 bg-red-50 rounded-lg">
          <i class="pi pi-times-circle text-xl"></i>
          <span>{{ res.message }}</span>
        </div>
      </div>

      <div class="flex justify-end gap-3 p-4 border-t border-gray-100">
        <button *ngIf="res.status === '200'"
                (click)="enviarContratoParaAssinatura(res)"
                class="bg-blue-600 text-white px-5 py-2.5 rounded-lg">
          Enviar WhatsApp
        </button>
        <button (click)="fecharModal()" class="px-5 py-2.5 border rounded-lg">
          Fechar
        </button>
      </div>

    </div>
  </div>
</div>

<p-blockUI [blocked]="loading">
  <div class="fixed inset-0 z-[10001] flex flex-col items-center justify-center bg-black/50 backdrop-blur-sm" *ngIf="loading">
    <p-progressSpinner
      strokeWidth="4"
      fill="transparent"
      animationDuration=".5s">
    </p-progressSpinner>
  </div>
</p-blockUI>
