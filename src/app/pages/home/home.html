<p class="font-2xl font-bold text-center mt-5">Contratos</p>

<div class="flex flex-col gap-4 p-5">
  <div *ngFor="let contrato of contratos"
       (click)="navegarContratoDetalhes(contrato)"
  class="border border-gray-800 p-3 rounded">
    <p>{{ contrato.nome }}</p>
    <p>{{ contrato.endereco }}</p>
    <p>{{ contrato.telefone }}</p>
    <p>{{ contrato.data_locacao }}</p>
    <p>{{ getValorTotal(contrato) | currency:'BRL':'symbol':'1.2-2' }}</p>
  </div>
</div>
<p-button icon="pi pi-plus" class="absolute right-5 bottom-5" (click)="criarContrato()" />
