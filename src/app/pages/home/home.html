<div class="mb-2 bg-primary w-full h-10 flex items-center justify-between">
  <span class="font-bold text-white text-lg w-full text-center">Contratos</span>
</div>

<div *ngIf="loading">
  <div *ngFor="let i of [1,2,3]" class="border-round border-1 surface-border px-4 py-1 mb-3 surface-card">
    <p-skeleton width="100%" height="150px"></p-skeleton>
  </div>
</div>

<div *ngIf="!loading" class="flex flex-col gap-4 p-5">
  <div *ngFor="let contrato of contratos.reverse()"
       (click)="navegarContratoDetalhes(contrato)"
  class="border border-gray-800 p-3 rounded">
    <p>{{ contrato.nome }}</p>
    <p>{{ contrato.endereco }}</p>
    <p>{{ contrato.telefone }}</p>
    <p>{{ contrato.data_locacao }}</p>
    <div class="flex justify-between items-center">
      <p>{{ getValorTotal(contrato) | currency:'BRL':'symbol':'1.2-2' }}</p>
      <span *ngIf="!contrato.signature" class="bg-red-500 flex justify-center text-center text-white text-sm font-bold px-2 pt-0.5 rounded-full">Sem assinatura</span>
    </div>
  </div>
</div>
<p-button icon="pi pi-plus" class="absolute right-5 bottom-5" (click)="criarContrato()" />
